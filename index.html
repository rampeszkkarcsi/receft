<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recept kereső</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <h1>Recept kereső</h1>

    <div class="toolbar">
      <input id="search" type="text" placeholder="Keresés alapanyagra vagy címre…">
      <div id="resultCount" class="muted"></div>
    </div>

    <section id="recipes" class="grid"></section>
  </main>

  <template id="recipeTemplate">
    <article class="card">
      <img class="thumb" alt="">
      <div class="card-body">
        <h2 class="title"></h2>
        <div class="meta"></div>
        <div class="ingredients"></div>
        <div class="steps"></div>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
